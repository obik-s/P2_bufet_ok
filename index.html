<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objednávkový formulář</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: auto;
        padding: 20px;
        background-color: #f5f5f5;
    }

    h1 {
        text-align: center;
    }

    .item {
        margin-bottom: 10px;
        background: white;
        padding: 10px;
        border-radius: 8px;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        background-color: #0078d4;
        color: white;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background-color: #005ea6;
    }
</style>
</head>

<body>

<h1>Objednávkový formulář</h1>

<!-- ========================= -->
<!-- POVINNÁ VSTUPNÍ POLE -->
<!-- ========================= -->
<input type="text" id="name" placeholder="Příjmení Jméno" required>
<input type="tel" id="phone" placeholder="+420 000 000 000" required>

<div class="item">
    <label>Produkt A (100 Kč)</label>
    <input type="number" id="produktA" min="0" value="0">
</div>

<div class="item">
    <label>Produkt B (200 Kč)</label>
    <input type="number" id="produktB" min="0" value="0">
</div>

<div class="item">
    <label>Produkt C (300 Kč)</label>
    <input type="number" id="produktC" min="0" value="0">
</div>

<button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

<script>
/* ===================================== */
/* MAILTO FUNKCE PRO ODESLÁNÍ OBJEDNÁVKY */
/* ===================================== */
function odeslatObjednavku() {

    const jmeno = document.getElementById("name").value.trim();
    const telefon = document.getElementById("phone").value.trim();

    // VALIDACE
    if (!jmeno || !telefon) {
        alert("Vyplňte prosím jméno a telefon.");
        return;
    }

    // Bezpečné načtení hodnot (řeší NaN)
    function getValue(id) {
        return parseInt(document.getElementById(id).value) || 0;
    }

    const produkty = [
        {nazev: "Produkt A", cena: 100, pocet: getValue("produktA")},
        {nazev: "Produkt B", cena: 200, pocet: getValue("produktB")},
        {nazev: "Produkt C", cena: 300, pocet: getValue("produktC")}
    ];

    let seznam = "";
    let celkem = 0;

    produkty.forEach(p => {
        if (p.pocet > 0) {
            const suma = p.pocet * p.cena;
            celkem += suma;

            seznam += `${p.nazev}: ${p.pocet} ks × ${p.cena} Kč = ${suma} Kč\n`;
        }
    });

    if (celkem === 0) {
        alert("Vyberte alespoň jeden produkt.");
        return;
    }

    const bodyText =
`OBJEDNÁVKA

Jméno: ${jmeno}
Telefon: ${telefon}

Položky:
${seznam}
------------------------
CELKEM: ${celkem} Kč`;

    /* ===================================== */
    /* GENEROVÁNÍ MAILTO ODKAZU */
    /* ===================================== */
    const mailto =
        `mailto:obadalova.kristyna@kostka-skola.cz`
        + `?subject=${encodeURIComponent("Nová objednávka")}`
        + `&body=${encodeURIComponent(bodyText)}`;

    // Otevření e-mailu
    window.location.href = mailto;
}
</script>

</body>
</html>
